name: Docker Build and Push

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate tag
        id: tag
        run: echo "tag=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/searchai:latest
            ${{ secrets.DOCKER_USERNAME }}/searchai:${{ steps.tag.outputs.tag }}

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag in deployment.yaml
        working-directory: gitops
        run: |
          sed -i "s|image: .*/searchai:.*|image: ${{ secrets.DOCKER_USERNAME }}/searchai:${{ steps.tag.outputs.tag }}|" k8s/deployment.yaml

      - name: Commit and push
        working-directory: gitops
        run: |
          git config user.name "JANG SEONG JU"
          git config user.email "printhelloworld0702@gmail.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update searchai image tag to ${{ steps.tag.outputs.tag }}"
          git push
