name: Build Image & Update GitOps

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'k8s/**'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout Application Repository
        uses: actions/checkout@v4

      - name: Authenticate Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Image Tag
        id: tag
        run: |
          echo "tag=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/searchai:latest
            ${{ secrets.DOCKER_USERNAME }}/searchai:${{ steps.tag.outputs.tag }}

      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update Deployment Image Tag
        working-directory: gitops
        run: |
          sed -i "s|image: .*/searchai:.*|image: ${{ secrets.DOCKER_USERNAME }}/searchai:${{ steps.tag.outputs.tag }}|" searchAI/deployment.yaml

      - name: Commit and Push GitOps Changes
        working-directory: gitops
        run: |
          git config user.name "JANG SEONG JU"
          git config user.email "printhelloworld0702@gmail.com"

          git add searchAI/deployment.yaml

          git diff --cached --quiet && exit 0

          git commit -m "chore(searchai): bump image to ${{ steps.tag.outputs.tag }}"
          git push
